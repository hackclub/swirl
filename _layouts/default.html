<!doctype html>
<html lang="en"{% if page.html_attrs %} {{ page.html_attrs }}{% endif %}>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}" />
    {%- if page.layout == "subpage" %}
    <link rel="stylesheet" href="{{ '/css/subpage.css' | relative_url }}" />
    {%- endif %}
    <link rel="icon" type="image/x-icon" href="{{ '/assets/png/sprinkles.png' | relative_url }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Preahvihear&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    {% include navbar.html %}

    <main>
      {{ content }}
    </main>

    {% include footer.html %}
  </body>
</html>
